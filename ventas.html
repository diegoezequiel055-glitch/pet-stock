<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas — Pet Stock</title>
  <link rel="stylesheet" href="css/styles.css?v=12">
  <style>
    /* ---- Tarjetas resumen ---- */
    .tarjetas-resumen {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .tarjeta {
      background: white;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: var(--sombra);
    }
    body.dark .tarjeta {
      background: #1e293b;
      border: 1px solid #334155;
    }
    .tarjeta .etiqueta {
      font-size: 11px;
      font-weight: 700;
      color: var(--gris);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .tarjeta .valor {
      font-size: 18px;
      font-weight: 700;
      color: var(--verde);
    }
    .tarjeta .gan-est {
      font-size: 11px;
      color: #f97316;
      margin-top: 5px;
      line-height: 1.4;
      white-space: pre-line;
    }
    body.dark .tarjeta .gan-est { color: #fb923c; }

    /* ---- Filtros rápidos ---- */
    .filtros-rapidos {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .filtros-rapidos button {
      padding: 5px 14px;
      border: 1.5px solid var(--borde);
      border-radius: 20px;
      background: white;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }
    body.dark .filtros-rapidos button {
      background: #1e293b;
      border-color: #334155;
      color: #cbd5e1;
    }
    .filtros-rapidos button:hover,
    .filtros-rapidos button.activo {
      background: var(--verde);
      color: white;
      border-color: var(--verde);
    }

    /* ---- Ganancia ---- */
    .ganancia-pos { color: var(--verde); }
    .ganancia-neg { color: var(--rojo); }

    /* ---- Barra de acciones ---- */
    .barra-acciones {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    .contador-resultados { font-size: 13px; color: var(--gris); }

    /* ---- Sección cierres diarios ---- */
    .seccion-titulo {
      font-size: 16px;
      font-weight: 700;
      color: #e2e8f0;
      margin: 24px 0 12px;
      padding-left: 4px;
      border-left: 4px solid #f97316;
    }
    body:not(.dark) .seccion-titulo { color: #1e293b; }
  </style>
</head>
<body>

<!-- ===== NAVEGACIÓN ===== -->
<nav>
  <a class="logo" href="index.html">🐾 Pet Stock</a>
  <a href="stock-bolsas.html">📦 Bolsas</a>
  <a href="accesorios.html">🧸 Accesorios</a>
  <a href="lista-precios.html">💲 Precios</a>
  <a href="vender.html">🛒 Vender</a>
  <a href="ventas.html" class="activo">📋 Historial</a>
</nav>

<div class="container" style="padding-bottom:90px">

  <!-- Encabezado -->
  <div class="page-header">
    <h1>📋 Historial de Ventas</h1>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" onclick="exportarCSV()">⬇ Exportar CSV</button>
      <button class="btn btn-verde" id="btn-recargar" onclick="cargarVentas()">↻ Actualizar</button>
    </div>
  </div>

  <!-- Tarjetas resumen — bolsas -->
  <div class="tarjetas-resumen">
    <div class="tarjeta">
      <div class="etiqueta">Ventas</div>
      <div class="valor" id="res-v-cantidad">—</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Facturado bolsas</div>
      <div class="valor" id="res-v-facturado" style="font-size:15px">—</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Costo total</div>
      <div class="valor" id="res-v-costo" style="font-size:15px;color:var(--gris)">—</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Ganancia total</div>
      <div class="valor" id="res-v-ganancia" style="font-size:15px">—</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Margen</div>
      <div class="valor" id="res-v-margen">—</div>
    </div>
  </div>

  <!-- Tarjetas caja PetShop — CAMBIOS 1-3 -->
  <div class="tarjetas-resumen">
    <div class="tarjeta">
      <div class="etiqueta">🏪 Cierre / Otros</div>
      <div class="valor" id="res-cierre-total" style="font-size:15px;color:#f97316">—</div>
      <div class="gan-est" id="res-cierre-gan">—</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">💊 Farmacia</div>
      <div class="valor" id="res-farmacia-total" style="font-size:15px;color:#22d3ee">—</div>
      <div class="gan-est" id="res-farmacia-gan">—</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">🧸 Accesorios</div>
      <div class="valor" id="res-acc-total" style="font-size:15px;color:#a78bfa">—</div>
      <div class="gan-est" id="res-acc-gan">—</div>
    </div>
  </div>

  <!-- Filtros rápidos por período -->
  <div class="filtros-rapidos">
    <span style="font-size:13px;color:var(--gris);align-self:center">Ver:</span>
    <button onclick="filtroRapido('hoy')">Hoy</button>
    <button onclick="filtroRapido('semana')">Esta semana</button>
    <button onclick="filtroRapido('mes')" class="activo">Este mes</button>
    <button onclick="filtroRapido('todo')">Todo</button>
  </div>

  <!-- Filtros combinados -->
  <div class="toolbar" style="margin-bottom:10px">
    <input type="text" id="buscador-v" placeholder="Buscar producto o cliente...">
    <select id="filtro-tipo">
      <option value="">Bolsas y accesorios</option>
      <option value="bolsa">📦 Solo bolsas</option>
      <option value="accesorio">🧸 Solo accesorios</option>
      <option value="mayorista">📦 Mayorista</option>
    </select>
    <input type="date" id="filtro-desde" title="Desde">
    <input type="date" id="filtro-hasta" title="Hasta">
  </div>

  <!-- Contador de resultados -->
  <div class="barra-acciones">
    <span class="contador-resultados" id="contador-ventas"></span>
  </div>

  <!-- Acordeones por día — ventas de bolsas (CAMBIO 5) -->
  <div id="lista-ventas-dias">
    <div style="padding:24px;text-align:center;color:#64748b">Cargando...</div>
  </div>

  <!-- Sección Cierres Diarios Pet Shop — CAMBIO 6 -->
  <div class="seccion-titulo">🏪 Cierres Diarios Pet Shop</div>
  <div id="lista-cierres-dias">
    <div style="padding:24px;text-align:center;color:#64748b">Cargando...</div>
  </div>

</div>

<!-- ===== SCRIPTS ===== -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=13"></script>
<script src="js/utils.js?v=13"></script>
<script src="js/ventas.js?v=15"></script>
<script src="js/nav-mobile.js?v=13"></script>

<script>
  // Marcar botón de filtro rápido activo
  document.querySelectorAll('.filtros-rapidos button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filtros-rapidos button').forEach(function(b) {
        b.classList.remove('activo');
      });
      this.classList.add('activo');
    });
  });
</script>

</body>
</html>
